[phases.setup]
nixPkgs = ["nodejs_22", "python311", "python311Packages.virtualenv"]

[phases.install]
cmds = [
  "cd app && npm ci",
  "cd app && virtualenv -p python3 .venv",
  "cd app && .venv/bin/pip install -r requirements.txt"
]

[start]
cmd = "cd app && PYTHON_BIN=.venv/bin/python npm run start"
